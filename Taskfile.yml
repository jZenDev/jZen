# jZen global orchestrator.
#
# Taskfile triggers native tools; it never replaces them. `mvnw` owns Java resolution,
# `dart pub` owns Dart, `pnpm` owns TypeScript. Every task below shells out to the tool
# that already knows how to do the job.
#
# Folders use industry names: server/ (Java backend), client/ (Dart/Flutter), admin/
# (ReactAdmin). Task groups follow: deps:server / build:client / test:admin, etc.
#
# Install: brew install go-task/tap/go-task   (see `task doctor`)
version: "3"

vars:
  # server/ + client/ are the Java + Dart FRAMEWORK libraries; apps/ holds the full-stack
  # application examples that assemble them (apps/<app>/{<app>_client, <app>_server}).
  SERVER_DIR: server
  CLIENT_DIR: client
  APPS_DIR: apps
  # admin/ is the framework's reusable react-admin scaffold (@jzen/admin-core, ADR-005); each
  # app assembles it into its own panel under apps/<app>/<app>_admin.
  ADMIN_DIR: admin
  PROTO_DIR: proto
  # The runnable reference backend (the only Quarkus app) is apps/zen_demo/zen_demo_server.
  DEMO_SERVER_DIR: apps/zen_demo/zen_demo_server
  DEMO_CLIENT_DIR: apps/zen_demo/zen_demo_client
  # The zen_demo app's admin panel: assembles @jzen/admin-core, owns the generated schema.
  DEMO_ADMIN_DIR: apps/zen_demo/zen_demo_admin
  OPENAPI_JSON: apps/zen_demo/zen_demo_server/target/openapi/openapi.json

  # `dart format` over a workspace, minus the tracked generated protobuf. It has no ignore file
  # and does not read `analyzer: exclude:` (that governs analysis), so the exclusion lives here.
  # Formatting a generated file makes `sync:contracts` report drift the next time protoc runs.
  # Width is NOT passed as a flag: it is declared in each workspace's analysis_options.yaml so an
  # IDE format-on-save produces the same result as this task.
  DART_FORMAT: >-
    find . -name '*.dart' ! -path '*/generated/*' ! -path '*/.dart_tool/*' -print0
    | xargs -0 dart format

  # Cloud Run coordinates, overridable via the environment.
  GCP_PROJECT: '{{.GCP_PROJECT | default "CHANGEME-jzen"}}'
  GCP_REGION: '{{.GCP_REGION | default "europe-central2"}}'
  SERVICE_NAME: '{{.SERVICE_NAME | default "zen-demo-server"}}'
  AR_REPO: '{{.AR_REPO | default "jzen"}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  # ---------------------------------------------------------------------------
  # Environment
  # ---------------------------------------------------------------------------
  doctor:
    desc: Check that every required tool is present AND at the pinned version
    silent: true
    summary: |
      Checks presence and, for the four build-input tools, the pinned version.

      It used to check presence only, which meant "JDK 25" was documentation rather than
      enforcement: a contributor on another version got a green doctor and a confusing
      failure later, or worse, silently different output. `task format` is the live case —
      the committed Dart layout is what Dart 3.12.2 produces.

      EACH PIN LIVES WHERE ITS OWN ECOSYSTEM ALREADY LOOKS FOR IT, and this task reads those
      files rather than restating a version:

        .sdkmanrc      java     SDKMAN     `sdk env`
        .fvmrc         flutter  FVM        `fvm use` (Flutter carries Dart, so this pins Dart)
        .nvmrc         node     nvm        `nvm use`
        package.json   pnpm     corepack   "packageManager", which corepack enforces itself

      No universal version manager sits over the top of those. That is the same rule the
      orchestrator follows (DECISIONS.md ADR-014): the native tool owns its domain, and a
      layer above it would be a portability layer nothing here asks for. The pnpm entry is
      the cleanest case — corepack reads "packageManager" to decide which pnpm to run, so
      the pin and its enforcement are literally the same field.

      doctor reports drift; the ecosystem tool fixes it. Tools with no pin are presence-only,
      each for a reason given beside its check below.
    cmds:
      - |
        set -e
        missing=0
        # Each pin is read from the file its own ecosystem already reads, so a version is
        # never restated here and the check cannot drift from what the tools enforce.
        pin_java()    { sed -n 's/^java=\([0-9][0-9.]*\).*/\1/p' .sdkmanrc | head -1; }
        pin_flutter() { sed -n 's/.*"flutter" *: *"\([^"]*\)".*/\1/p' .fvmrc | head -1; }
        pin_node()    { tr -d 'v \n' < .nvmrc; }
        pin_pnpm()    { sed -n 's/.*"packageManager" *: *"pnpm@\([^"]*\)".*/\1/p' "$1" | head -1; }

        # Presence only. Used for tools that are services, clients, or codegen extras.
        check() {
          if command -v "$1" >/dev/null 2>&1; then
            printf '  \033[32mok\033[0m   %-14s %s\n' "$1" "$($2 2>&1 | head -1)"
          else
            printf '  \033[31mMISS\033[0m %-14s %s\n' "$1" "$3"
            missing=1
          fi
        }

        # Presence AND version. $2 must print a BARE version (e.g. 25.0.2), so the comparison
        # never depends on how a tool decorates its output. $5 names the tool that fixes a
        # drift, because that differs per ecosystem — which is the point of pinning natively.
        # A match is equality or a dot-boundary prefix, so a pin of "25" accepts 25.0.2 and
        # rejects 21.0.5 — including when 21 was built in a year containing "25".
        checkv() {
          name=$1; ver_cmd=$2; hint=$3; want=$4; fix=$5
          if ! command -v "$name" >/dev/null 2>&1; then
            printf '  \033[31mMISS\033[0m %-14s %s\n' "$name" "$hint"; missing=1; return
          fi
          got=$(eval "$ver_cmd" 2>/dev/null | head -1)
          if [ "$got" = "$want" ] || [ "${got#"$want".}" != "$got" ]; then
            printf '  \033[32mok\033[0m   %-14s %s\n' "$name" "$got"
          else
            printf '  \033[31mDRIFT\033[0m %-13s %s (want %s)\n' "$name" "$got" "$want"
            printf '       %-14s run: %s\n' "" "$fix"
            missing=1
          fi
        }

        echo "jZen toolchain (each version pinned in its own ecosystem's file):"
        checkv java    "java -version 2>&1 | sed -n '1s/.*\"\([0-9][^\"]*\)\".*/\1/p'" "sdk env install"                              "$(pin_java)"    "sdk env"
        checkv flutter "flutter --version | awk 'NR==1{print \$2}'"                    "https://docs.flutter.dev/get-started/install" "$(pin_flutter)" "fvm use"
        checkv node    "node --version | tr -d v"                                      "nvm install"                                  "$(pin_node)"    "nvm use"
        checkv pnpm    "pnpm --version"                                                "corepack enable"                              "$(pin_pnpm admin/package.json)" "corepack enable"

        # The two package.json files must agree, or corepack would enforce a different pnpm
        # per package and doctor would only ever see the first one.
        pm_core=$(pin_pnpm admin/package.json)
        pm_app=$(pin_pnpm {{.DEMO_ADMIN_DIR}}/package.json)
        if [ "$pm_core" != "$pm_app" ]; then
          printf '  \033[31mDRIFT\033[0m %-13s packageManager disagrees: admin=%s demo_admin=%s\n' "pnpm pin" "$pm_core" "$pm_app"
          missing=1
        fi

        echo "Present-but-unpinned, each for a reason:"
        check dart     "dart --version"      "comes with Flutter; never install separately — .fvmrc pins it"
        check supabase "supabase --version"  "a local dev service, not a build input: brew install supabase/tap/supabase"
        check docker   "docker --version"    "a daemon, not a toolchain version: https://docs.docker.com/get-docker"
        check gcloud   "gcloud --version"    "a deploy-time client, expected to self-update: https://cloud.google.com/sdk/docs/install"
        echo "Dart protobuf codegen (needed by generate:proto, not by the Java build):"
        check protoc   "protoc --version"    "brew install protobuf"
        if [ -x "$HOME/.pub-cache/bin/protoc-gen-dart" ]; then
          printf '  \033[32mok\033[0m   %-14s %s\n' "protoc-gen-dart" "$HOME/.pub-cache/bin/protoc-gen-dart"
        else
          printf '  \033[31mMISS\033[0m %-14s %s\n' "protoc-gen-dart" "dart pub global activate protoc_plugin"
          missing=1
        fi
        # The switchers are optional: a matching version installed any other way is still a
        # match, so their absence is a note rather than a failure — they are only what makes
        # fixing a drift a one-liner.
        #
        # SDKMAN and nvm are SHELL FUNCTIONS sourced into an interactive shell, not binaries, so
        # `command -v sdk` fails here even when they are installed and on PATH. Probing for their
        # init script is what actually answers the question; probing the command name would
        # report every user of them as not having them. FVM really is a binary.
        [ -s "$HOME/.sdkman/bin/sdkman-init.sh" ] || \
          printf '  \033[33mnote\033[0m %-14s not found, so .sdkmanrc cannot be applied — https://sdkman.io\n' "sdkman"
        [ -s "$HOME/.nvm/nvm.sh" ] || \
          printf '  \033[33mnote\033[0m %-14s not found, so .nvmrc cannot be applied — https://github.com/nvm-sh/nvm\n' "nvm"
        command -v fvm >/dev/null 2>&1 || \
          printf '  \033[33mnote\033[0m %-14s not installed, so .fvmrc cannot be applied — brew tap leoafarias/fvm && brew install fvm\n' "fvm"
        echo
        # protoc is NOT required for the Java build: protobuf-maven-plugin resolves the
        # protoc binary from Maven Central (see server/zen-proto/pom.xml).
        if [ "$missing" -eq 0 ]; then echo "Toolchain matches the pinned versions."; else
          echo "Toolchain is missing a tool or drifted from a pin. See the fix beside each line above."; exit 1; fi

  deps:
    desc: Resolve dependencies for every sub-project (native tools do the work)
    deps: [deps:server, deps:client, deps:admin]

  deps:server:
    desc: Resolve Maven dependencies
    dir: "{{.SERVER_DIR}}"
    cmds:
      - ./mvnw -B -q dependency:go-offline

  deps:client:
    desc: Resolve the Dart pub workspace
    dir: "{{.CLIENT_DIR}}"
    cmds:
      - dart pub get

  deps:admin:
    desc: Install admin dependencies (framework scaffold + zen_demo panel)
    cmds:
      - cd {{.ADMIN_DIR}} && pnpm install
      - cd {{.DEMO_ADMIN_DIR}} && pnpm install

  # ---------------------------------------------------------------------------
  # Code generation - proto is upstream, OpenAPI is derived
  # ---------------------------------------------------------------------------
  #
  #   proto/zen/v1/*.proto            (canonical models)
  #     |-- protoc --> Java DTOs      (protobuf-maven-plugin, in server/zen-proto)
  #     |-- protoc --> Dart messages  (protoc_plugin, here)
  #     v
  #   Java resources + SmallRye --> openapi.json  (canonical REST surface)
  #     v
  #   openapi-typescript --> admin types
  #
  generate:proto:
    desc: Generate Java and Dart code from proto/
    cmds:
      - task: generate:proto:java
      - task: generate:proto:dart

  generate:proto:java:
    desc: Generate Java DTOs from proto/ (protoc resolved from Maven Central)
    dir: "{{.SERVER_DIR}}"
    cmds:
      - ./mvnw -B -q -pl zen-proto generate-sources

  generate:proto:dart:
    desc: Generate Dart messages from proto/
    silent: true
    cmds:
      - |
        set -e
        shopt -s nullglob
        protos=({{.PROTO_DIR}}/zen/v1/*.proto)
        if [ ${#protos[@]} -eq 0 ]; then
          echo "No .proto files yet, skipping Dart codegen."
          exit 0
        fi
        command -v protoc >/dev/null 2>&1 || { echo "protoc not found. Run: task doctor"; exit 1; }
        [ -x "$HOME/.pub-cache/bin/protoc-gen-dart" ] || { echo "protoc-gen-dart not found. Run: dart pub global activate protoc_plugin"; exit 1; }
        out={{.CLIENT_DIR}}/zen_transport/lib/src/generated
        mkdir -p "$out"
        PATH="$HOME/.pub-cache/bin:$PATH" protoc -I {{.PROTO_DIR}} --dart_out="$out" "${protos[@]}"
        echo "Generated Dart messages -> $out"

  generate:l10n:
    desc: Generate the typed client localizations from the ARB files
    silent: true
    summary: |
      Runs `flutter gen-l10n` in every package that declares an l10n.yaml: the ARB files
      under lib/src/l10n are the source, the classes under lib/src/l10n/generated are the output.
      (The zen_ui_navigation example has no lib/src, so its pair sits at lib/l10n.)

      Unlike the proto and OpenAPI artifacts, this output is BUILT, NOT TRACKED (see
      STANDARDS "Code generation" and DECISIONS.md ADR-009): gen-l10n ships inside the
      Flutter SDK that every consumer of these packages already has, so there is no
      toolchain boundary to carry the result across. It is gitignored, produced here, and
      sync:contracts asserts that none of it is tracked.
    cmds:
      - |
        set -e
        found=0
        for config in $(find {{.CLIENT_DIR}} {{.APPS_DIR}} -name l10n.yaml -not -path '*/.dart_tool/*' -not -path '*/build/*' | sort); do
          pkgdir=$(dirname "$config")
          found=$((found + 1))
          echo ">> flutter gen-l10n ($pkgdir)"
          (cd "$pkgdir" && flutter gen-l10n)
        done
        if [ "$found" -eq 0 ]; then
          echo "No localized packages found (no l10n.yaml)."
        fi

  generate:api:
    desc: Build the backend, emit openapi.json, and generate admin types
    cmds:
      - task: generate:api:schema
      - task: generate:api:ts

  generate:api:schema:
    desc: Emit openapi.json from the reference backend's annotated resources (SmallRye)
    dir: "{{.SERVER_DIR}}"
    cmds:
      # Install the framework libs so the app can resolve them, then package the app (the only
      # Quarkus module) via the shared wrapper with -f. store-schema-directory writes the schema.
      - ./mvnw -B -q install -DskipTests
      - ./mvnw -B -q -f ../{{.DEMO_SERVER_DIR}}/pom.xml package -DskipTests

  generate:api:ts:
    desc: Generate admin types from openapi.json
    dir: "{{.DEMO_ADMIN_DIR}}"
    status:
      # openapi.json is a sibling of the panel (apps/zen_demo/{zen_demo_server,zen_demo_admin}).
      - test ! -f ../zen_demo_server/target/openapi/openapi.json
    cmds:
      - pnpm run generate:types

  sync:contracts:
    desc: Regenerate every cross-language artifact and FAIL if anything drifted
    summary: |
      The atomic contract sync. Regenerates Java DTOs, Dart messages, openapi.json and
      the admin TypeScript, then fails if any generated file changed.

      A failure means a generated file was hand-edited, or someone changed a .proto
      without regenerating. Fix by running `task generate:proto generate:api` and
      committing the result, never by editing generated output.

      It also regenerates the client localizations and asserts the opposite property for
      them: they are BUILT, NOT TRACKED (ADR-009), so the gate fails if any of that output
      was committed rather than if it changed.

      This is the gate that blocks out-of-sync bugs. Wire it into CI.
    cmds:
      - task: generate:proto
      - task: generate:api
      - task: generate:l10n
      - task: sync:verify

  sync:verify:
    desc: Fail if regeneration produced a dirty working tree, or tracked what must not be
    internal: true
    silent: true
    cmds:
      - |
        set -e
        if ! git rev-parse --git-dir >/dev/null 2>&1; then
          echo "Not a git repository, cannot verify contract sync."; exit 1
        fi
        # The proto watch is scoped to the .proto SOURCES, not everything under proto/: the gate
        # detects contract drift, and a doc file beside the contract (proto/README.md) is not one.
        dirty=$(git status --porcelain -- '*.generated.ts' '*.pb.dart' '*.pbjson.dart' '*.pbenum.dart' 'proto/**/*.proto')
        if [ -n "$dirty" ]; then
          echo "Contracts are OUT OF SYNC. Regenerated output differs from what is committed:"
          echo "$dirty"
          echo
          echo "Run 'task generate:proto generate:api' and commit the result."
          exit 1
        fi
        echo "Contracts in sync."
      # The mirror-image check for the artifacts the tracking rule sends the other way. A
      # generated localization file that IS tracked is the failure: it would then be
      # hand-editable without the compiler or this gate ever noticing.
      - |
        set -e
        tracked=$(git ls-files -- '*/l10n/generated/*')
        if [ -n "$tracked" ]; then
          echo "Generated localizations are TRACKED, and must not be (ADR-009):"
          echo "$tracked"
          echo
          echo "Run 'git rm --cached' on them; they are produced by 'task generate:l10n'."
          exit 1
        fi
        echo "Generated localizations correctly untracked."

  # ---------------------------------------------------------------------------
  # Build / test
  # ---------------------------------------------------------------------------
  build:
    desc: Sync contracts, then build every sub-project
    cmds:
      - task: sync:contracts
      - task: build:server
      - task: build:client
      - task: build:apps
      - task: build:admin

  build:server:
    desc: Build + install the Java FRAMEWORK libraries (so apps can resolve them)
    dir: "{{.SERVER_DIR}}"
    cmds:
      # install (not package): the app modules under apps/ resolve these from the local repo.
      - ./mvnw -B install -DskipTests

  build:server:native:
    desc: Build the reference backend as a native executable (what prod ships)
    dir: "{{.SERVER_DIR}}"
    cmds:
      # Install the framework libs, then build the app natively via the shared wrapper.
      # Container build, pinned to amd64 so the image matches Cloud Run regardless of arch.
      - ./mvnw -B install -DskipTests
      - >-
        ./mvnw -B package -Dnative -DskipTests
        -Dquarkus.native.container-build=true
        -Dquarkus.native.container-runtime-options=--platform=linux/amd64
        -f ../{{.DEMO_SERVER_DIR}}/pom.xml

  build:client:
    desc: Resolve and analyze the Dart/Flutter FRAMEWORK library workspace
    dir: "{{.CLIENT_DIR}}"
    cmds:
      # The workspace holds Flutter packages, so it is resolved with `flutter pub get`.
      # `dart analyze` then analyzes every member.
      - flutter pub get
      # The typed localizations are generated, not committed (ADR-009), so they must exist
      # before anything analyzes or compiles a package that imports them.
      - task: generate:l10n
      - dart analyze

  build:apps:
    desc: Build the application examples (their Dart clients + Java servers)
    cmds:
      - task: build:apps:client
      - task: build:apps:server

  build:apps:client:
    desc: Resolve and analyze the apps/ Dart workspace (the app clients)
    dir: "{{.APPS_DIR}}"
    cmds:
      - flutter pub get
      - task: generate:l10n
      - dart analyze

  build:apps:server:
    desc: Build the reference backend (resolves framework libs from the local repo)
    dir: "{{.SERVER_DIR}}"
    cmds:
      # Framework libs must be installed first; build:apps:server depends on build:server in
      # the top-level `build` ordering, but install here too so it stands alone.
      - ./mvnw -B -q install -DskipTests
      - ./mvnw -B -f ../{{.DEMO_SERVER_DIR}}/pom.xml package -DskipTests

  build:admin:
    desc: Build the admin panel
    dir: "{{.DEMO_ADMIN_DIR}}"
    cmds:
      - pnpm build

  test:
    desc: Run every test suite (test:e2e is the release gate - it hits the live stack)
    cmds:
      - task: test:server
      - task: test:client
      - task: test:apps
      - task: test:admin
      - task: test:e2e

  test:server:
    desc: Run Java FRAMEWORK library tests
    dir: "{{.SERVER_DIR}}"
    cmds:
      # The framework libs are exercised through the reference backend (test:apps:server) - a
      # @QuarkusTest needs an assembled app. Lib-level unit tests, when added, run here.
      - ./mvnw -B test

  test:client:
    desc: Run Dart and Flutter tests
    dir: "{{.CLIENT_DIR}}"
    silent: true
    cmds:
      # The typed localizations are built, not committed (ADR-009), so a clean checkout must
      # generate them before a test can import them.
      - task: generate:l10n
      # A failing test fails here - jZen does not swallow test failures.
      #
      # Neither `dart test` nor `flutter test` aggregates a pub workspace, so we iterate the
      # member packages ourselves. A package that depends on Flutter (dep or dev) is run with
      # `flutter test`; a pure-Dart package with `dart test`.
      #
      # Client config is compile-time: the UI packages read ZEN_PLATFORM via
      # String.fromEnvironment, and ZenNavigation asserts it is set. Flutter widget tests are
      # therefore compiled with the host platform define, mirroring how the real app builds.
      - |
        set -e
        case "$(uname -s)" in
          Darwin) host_platform=macos ;;
          Linux)  host_platform=linux ;;
          *)      host_platform=linux ;;
        esac
        found=0
        for pubspec in $(find . -mindepth 2 -name pubspec.yaml -not -path '*/.dart_tool/*' | sort); do
          pkgdir=$(dirname "$pubspec")
          [ -d "$pkgdir/test" ] || continue
          found=1
          if grep -qE '^[[:space:]]*(flutter|flutter_test):' "$pubspec"; then
            echo ">> flutter test ($pkgdir)"
            (cd "$pkgdir" && flutter test --dart-define=ZEN_ENV=dev --dart-define=ZEN_PLATFORM="$host_platform")
          else
            echo ">> dart test ($pkgdir)"
            (cd "$pkgdir" && dart test)
          fi
        done
        if [ "$found" -eq 0 ]; then
          echo "No Dart packages migrated yet - nothing to test. (ROADMAP step 2.)"
        fi

  test:apps:
    desc: Run the application examples' tests (Dart clients + Java servers)
    cmds:
      - task: test:apps:client
      - task: test:apps:server

  test:apps:client:
    desc: Run the app clients' Dart/Flutter unit tests (not the live e2e - see test:e2e)
    dir: "{{.APPS_DIR}}"
    silent: true
    cmds:
      - task: generate:l10n
      # Same per-package iteration as test:client. Only test/ dirs run here; integration_test/
      # (the live e2e) is driven separately by test:e2e against the real stack.
      - |
        set -e
        case "$(uname -s)" in
          Darwin) host_platform=macos ;;
          Linux)  host_platform=linux ;;
          *)      host_platform=linux ;;
        esac
        found=0
        for pubspec in $(find . -mindepth 2 -name pubspec.yaml -not -path '*/.dart_tool/*' | sort); do
          pkgdir=$(dirname "$pubspec")
          [ -d "$pkgdir/test" ] || continue
          found=1
          if grep -qE '^[[:space:]]*(flutter|flutter_test):' "$pubspec"; then
            echo ">> flutter test ($pkgdir)"
            (cd "$pkgdir" && flutter test --dart-define=ZEN_ENV=dev --dart-define=ZEN_PLATFORM="$host_platform")
          else
            echo ">> dart test ($pkgdir)"
            (cd "$pkgdir" && dart test)
          fi
        done
        [ "$found" -eq 1 ] || echo "No app packages with tests yet."

  test:apps:server:
    desc: Run the reference backend's tests (Dev Services Postgres; framework libs installed first)
    dir: "{{.SERVER_DIR}}"
    cmds:
      - ./mvnw -B -q install -DskipTests
      - ./mvnw -B -f ../{{.DEMO_SERVER_DIR}}/pom.xml test

  test:client:matrix:
    desc: Recompile-per-env/platform matrix for the transport codec selector
    dir: "{{.CLIENT_DIR}}/zen_transport"
    silent: true
    cmds:
      # selectDefaultCodec() is compile-time: dev -> json (any platform), prd native ->
      # protobuf, prd web -> json. Each row recompiles with a different ZEN_ENV / platform.
      - |
        set -e
        echo ">> ZEN_ENV=dev  (VM)   -> json"
        dart --define=ZEN_ENV=dev test test/zen_codec_selector_test.dart
        echo ">> ZEN_ENV=prd  (VM)   -> protobuf"
        dart --define=ZEN_ENV=prd test test/zen_codec_selector_test.dart
        echo ">> ZEN_ENV=prd  (web)  -> json"
        dart --define=ZEN_ENV=prd test test/zen_codec_selector_test.dart -p chrome

  test:admin:
    desc: Typecheck the admin panel (also typechecks the @jzen/admin-core scaffold it imports)
    dir: "{{.DEMO_ADMIN_DIR}}"
    cmds:
      - pnpm exec tsc -b

  test:e2e:
    desc: The release gate - drive zen_demo's suite against the LIVE Quarkus + Supabase stack
    summary: |
      The living end-to-end test stand (ROADMAP step 4). No mocks: it boots the local Supabase
      stack and the Quarkus server (dev profile, pointed at that stack), then runs zen_demo's
      pure-Dart integration suite on the VM - register/login/logout via real Supabase, a typed
      round trip in both transport modes, a localized surface, the WebSocket echo, and a ZenError
      path - tears the server down, and propagates the suite's exit code. Wired into `task test`
      and the CI release gate.

      A pure-Dart VM suite (not flutter integration_test) keeps CI headless and cheap, and because
      the VM is a dart:io platform it exercises the native session cookie jar for real. Runs the
      app on ZEN_APP_PORT (default 8085) to dodge a leftover Supabase stack that may shadow :8080.
    cmds:
      - |
        set -uo pipefail
        PORT="${ZEN_APP_PORT:-8085}"
        API="http://localhost:${PORT}"

        # Tear the server down by whatever is bound to the test port, and wait for the port to
        # actually free (Quarkus shuts down gracefully over a few seconds) so a following step
        # cannot collide on it; escalate to SIGKILL if it lingers. Port-scoped and reliable
        # across shells (go-task's interpreter can reparent `&`, so $! is not dependable), so a
        # dev server on another port is left alone.
        stop_server() {
          # pkill on the jar path is the dependable killer (the gate uniquely runs this jar; a dev
          # `run:server` uses quarkus:dev, not it). The port-scoped lsof pass is a belt-and-braces
          # fallback that also waits for the port to actually free, escalating to SIGKILL.
          pkill -f 'zen_demo_server/target/quarkus-app/quarkus-run.jar' 2>/dev/null || true
          port_pid=$(lsof -nP -iTCP:"${PORT}" -sTCP:LISTEN -t 2>/dev/null || true)
          [ -n "${port_pid}" ] && kill "${port_pid}" 2>/dev/null || true
          for _ in $(seq 1 15); do
            lsof -nP -iTCP:"${PORT}" -sTCP:LISTEN -t >/dev/null 2>&1 || return 0
            sleep 1
          done
          port_pid=$(lsof -nP -iTCP:"${PORT}" -sTCP:LISTEN -t 2>/dev/null || true)
          [ -n "${port_pid}" ] && kill -9 "${port_pid}" 2>/dev/null || true
        }

        set -e
        # Bring up the local Supabase stack if it is not already running.
        supabase status >/dev/null 2>&1 || supabase start
        # GoTrue requires the anon key as the apikey header; hand it and the API URL to Quarkus.
        eval "$(supabase status -o env | sed 's/^/export SB_/')"
        export SUPABASE_URL="${SB_API_URL}"
        export SUPABASE_KEY="${SB_ANON_KEY}"

        # Install the framework libs, then build the reference backend (fast when already built)
        # via the shared wrapper, and start it on the test port.
        ( cd {{.SERVER_DIR}} && ./mvnw -B -q install -DskipTests \
          && ./mvnw -B -q -f ../{{.DEMO_SERVER_DIR}}/pom.xml package -DskipTests )
        set +e
        java -Dquarkus.profile=dev -Dquarkus.http.port="${PORT}" \
          -jar {{.DEMO_SERVER_DIR}}/target/quarkus-app/quarkus-run.jar &

        # Wait for the server to answer /health before driving it.
        ready=0
        for _ in $(seq 1 60); do
          if curl -sf "${API}/api/v1/health" >/dev/null 2>&1; then ready=1; break; fi
          sleep 1
        done
        if [ "${ready}" -ne 1 ]; then echo "server did not become healthy on ${API}"; stop_server; exit 1; fi

        # The suite runs on the VM (native), exercising the real cookie jar. We capture its exit
        # code, tear the server down, and propagate the code - so the gate's result is the suite's.
        # ZEN_API_URL is read at runtime by the suite (dart test does not forward --define to the
        # compiled test); ZEN_ENV=dev keeps the default codec JSON where it does apply.
        ( cd {{.DEMO_CLIENT_DIR}} \
          && ZEN_API_URL="${API}" dart --define=ZEN_ENV=dev \
               test integration_test/e2e_test.dart )
        rc=$?
        stop_server
        exit "${rc}"

  # ---------------------------------------------------------------------------
  # Run
  # ---------------------------------------------------------------------------
  run:all:
    desc: Start Supabase and the backend (run the admin panel separately with task run:admin)
    deps: [run:supabase]
    cmds:
      - task: run:server

  run:supabase:
    desc: Start the local Supabase stack (API 54321, DB 54322, Studio 54323)
    cmds:
      - supabase start
    status:
      - supabase status >/dev/null 2>&1

  run:server:
    desc: Start the reference backend in Quarkus dev mode (live reload) on :8080
    dir: "{{.SERVER_DIR}}"
    cmds:
      # Install the framework libs, then run the app (apps/zen_demo/zen_demo_server) in dev mode
      # via the shared wrapper.
      - ./mvnw -B -q install -DskipTests
      - ./mvnw -f ../{{.DEMO_SERVER_DIR}}/pom.xml quarkus:dev

  run:demo:
    desc: Boot Supabase + the backend + the reference app (zen_demo) for a manual walkthrough
    summary: |
      The product showcase (ROADMAP step 4). Brings up the local Supabase stack, starts the
      Quarkus server (dev profile) on ZEN_APP_PORT (default 8085, to dodge a leftover stack that
      may shadow :8080), waits for /health, then runs zen_demo in Chrome pointed at it. The web
      build runs on a fixed port so the server's CORS allowlist can permit its credentialed
      requests. Ctrl-C stops the app; the server is torn down on exit. For the headless gate that
      asserts the same flow, see `task test:e2e`.
    deps: [run:supabase]
    cmds:
      - |
        set -euo pipefail
        PORT="${ZEN_APP_PORT:-8085}"
        WEB_PORT="${ZEN_WEB_PORT:-5200}"
        API="http://localhost:${PORT}"

        eval "$(supabase status -o env | sed 's/^/export SB_/')"
        export SUPABASE_URL="${SB_API_URL}"
        export SUPABASE_KEY="${SB_ANON_KEY}"
        # Let the browser's credentialed calls through CORS from the demo's web origin.
        export CORS_ORIGINS="http://localhost:${WEB_PORT},http://localhost:8080,http://localhost:5173"

        # Tear the server down: pkill the quarkus:dev java by its port system-property (dependable
        # across shells - go-task can reparent `&`, and quarkus:dev forks a child), then a
        # port-scoped lsof fallback that waits for the port to free, escalating to SIGKILL.
        stop_server() {
          pkill -f "quarkus.http.port=${PORT}" 2>/dev/null || true
          p=$(lsof -nP -iTCP:"${PORT}" -sTCP:LISTEN -t 2>/dev/null || true)
          [ -n "${p}" ] && kill "${p}" 2>/dev/null || true
          for _ in $(seq 1 15); do
            lsof -nP -iTCP:"${PORT}" -sTCP:LISTEN -t >/dev/null 2>&1 || return 0
            sleep 1
          done
          p=$(lsof -nP -iTCP:"${PORT}" -sTCP:LISTEN -t 2>/dev/null || true)
          [ -n "${p}" ] && kill -9 "${p}" 2>/dev/null || true
        }
        trap stop_server EXIT

        ( cd {{.SERVER_DIR}} && ./mvnw -B -q install -DskipTests \
          && ./mvnw -f ../{{.DEMO_SERVER_DIR}}/pom.xml quarkus:dev -Dquarkus.http.port="${PORT}" ) &

        ready=0
        for _ in $(seq 1 90); do
          if curl -sf "${API}/api/v1/health" >/dev/null 2>&1; then ready=1; break; fi
          sleep 1
        done
        [ "${ready}" -eq 1 ] || { echo "server did not become healthy on ${API}"; stop_server; exit 1; }

        cd {{.DEMO_CLIENT_DIR}}
        flutter run -d chrome --web-port="${WEB_PORT}" \
          --dart-define=ZEN_ENV=dev --dart-define=ZEN_PLATFORM=web --dart-define=ZEN_API_URL="${API}"
        stop_server

  run:admin:
    desc: Start the admin panel dev server on :5173 (proxies /api to the backend)
    dir: "{{.DEMO_ADMIN_DIR}}"
    cmds:
      - pnpm dev

  stop:supabase:
    desc: Stop the local Supabase stack
    cmds:
      - supabase stop

  # ---------------------------------------------------------------------------
  # Deploy
  # ---------------------------------------------------------------------------
  test:native:
    desc: Build the native image and smoke it IN DOCKER — the long check before a deploy
    summary: |
      The last gate before shipping. Builds the linux/amd64 native image, runs it in Docker
      against a throwaway Postgres, and asserts both wire formats answer. Slow (the native
      build dominates) and entirely local, so it costs nothing but time.

      WHY IN DOCKER RATHER THAN ON THE HOST. The image is built for linux/amd64 so it matches
      Cloud Run (STANDARDS "Deployment model"). On an arm64 developer machine that binary
      cannot be executed directly — it is an x86-64 Linux ELF — which rules out Quarkus's
      @QuarkusIntegrationTest, since that launches the runner as a host process. Running the
      container has no such problem and tests the exact artifact that will be deployed.

      WHY PLAIN POSTGRES AND NOT SUPABASE. The app migrates at startup, so it needs a
      database, but not Supabase specifically: V2__row_level_security.sql is guarded on
      `to_regprocedure('auth.uid()')` precisely so it is a no-op off Supabase. A disposable
      container is therefore enough, it cannot collide with a Supabase stack another project
      left running, and it keeps this gate free of network dependencies.

      WHY BOTH TRANSPORT MODES. The first deployed revision served protobuf perfectly and
      500'd on every JSON response — binary serialisation uses generated code, while
      canonical proto3 JSON resolves accessors reflectively and needs them registered for
      native (zen.transport.ZenProtoReflection). Half a seam looks entirely healthy if you
      only probe one format, and JSON is the default and what both frontends speak.
    cmds:
      - task: build:server:native
      - |
        set -eu
        IMG=zen-native-smoke:local
        NET=zen-smoke-net
        cleanup() {
          docker rm -f zen-smoke-app zen-smoke-db >/dev/null 2>&1 || true
          docker network rm "$NET" >/dev/null 2>&1 || true
        }
        trap cleanup EXIT
        cleanup

        docker build --platform=linux/amd64 -q \
          -f {{.DEMO_SERVER_DIR}}/src/main/docker/Dockerfile.native-micro \
          -t "$IMG" {{.DEMO_SERVER_DIR}} >/dev/null
        docker network create "$NET" >/dev/null

        docker run -d --name zen-smoke-db --network "$NET" \
          -e POSTGRES_PASSWORD=smoke -e POSTGRES_DB=postgres postgres:17-alpine >/dev/null
        for _ in $(seq 1 30); do
          docker exec zen-smoke-db pg_isready -U postgres >/dev/null 2>&1 && break; sleep 1
        done

        # Config values are deliberately fake except the datasource: this gate proves the
        # image boots, migrates and serialises. Anything needing real Supabase or SMTP is
        # covered by test:e2e on the JVM and by verify:deploy against the real environment.
        docker run -d --name zen-smoke-app --network "$NET" -p 18080:8080 --platform=linux/amd64 \
          -e DB_URL=jdbc:postgresql://zen-smoke-db:5432/postgres \
          -e DB_USERNAME=postgres -e DB_PASSWORD=smoke \
          -e SUPABASE_URL=http://localhost:54321 -e SUPABASE_KEY=smoke \
          -e SITE_URL=http://localhost:18080 \
          -e AUTH_REDIRECT_URI=http://localhost:18080/auth/callback \
          -e CORS_ORIGINS=http://localhost:18080 \
          -e SMTP_HOST=localhost -e SMTP_PORT=1025 -e SMTP_USERNAME=x -e SMTP_PASSWORD=x \
          -e SMTP_FROM=x@example.com -e ZEN_JOBS_TRIGGER_TOKEN=smoke-token \
          "$IMG" >/dev/null

        up=0
        for _ in $(seq 1 60); do
          curl -sf -H 'X-Zen-Transport: protobuf' http://localhost:18080/api/v1/health >/dev/null 2>&1 \
            && { up=1; break; }
          sleep 1
        done
        if [ "$up" -ne 1 ]; then
          echo "Native image never became healthy. Container log:"
          docker logs zen-smoke-app 2>&1 | tail -40
          exit 1
        fi

        SERVICE_URL=http://localhost:18080 task verify:endpoints

  verify:deploy:
    desc: Smoke the DEPLOYED service — both transport modes must answer, not just one
    summary: |
      Resolves the live Cloud Run URL and runs the same assertions test:native runs against a
      local container, so a deployment is held to exactly the standard the pre-deploy gate
      enforces. Override with `SERVICE_URL=https://... task verify:deploy` for any environment.

      Run it after every deploy. To keep a bad revision from serving traffic at all, deploy
      with `--no-traffic --tag=candidate`, verify the tagged URL, then shift traffic.
    cmds:
      - |
        set -eu
        URL="${SERVICE_URL:-}"
        if [ -z "$URL" ]; then
          URL=$(gcloud run services describe {{.SERVICE_NAME}} --project={{.GCP_PROJECT}} \
                  --region={{.GCP_REGION}} --format='value(status.url)' 2>/dev/null || true)
        fi
        [ -n "$URL" ] || { echo "No service URL. Set SERVICE_URL=... or GCP_PROJECT=..."; exit 1; }
        SERVICE_URL="$URL" task verify:endpoints

  verify:endpoints:
    desc: Assert a running jZen backend serves BOTH transport modes (SERVICE_URL required)
    silent: true
    summary: |
      The shared assertion set, used by test:native against a local container and by
      verify:deploy against a real environment. One definition, so the gate before shipping
      and the check after it cannot drift apart.

      WHY BOTH MODES, ALWAYS. The first deployed revision served protobuf perfectly and 500'd
      on every JSON response: binary serialisation uses generated code, while canonical proto3
      JSON resolves field accessors reflectively and needs them registered for native
      (zen.transport.ZenProtoReflection). A single-format smoke test would have passed on a
      build that served no web client at all — and JSON is the default, and what both the
      Flutter web app and the admin panel speak.
    cmds:
      - |
        set -eu
        URL="${SERVICE_URL:?set SERVICE_URL}"
        echo "Verifying $URL"
        fail=0
        probe() {
          path=$1
          for spec in "nohdr:$2:" "json:$3:X-Zen-Transport: json" "protobuf:$4:X-Zen-Transport: protobuf"; do
            mode=${spec%%:*}; rest=${spec#*:}; want=${rest%%:*}; hdr=${rest#*:}
            if [ -n "$hdr" ]; then
              code=$(curl -s -o /dev/null -w '%{http_code}' -H "$hdr" "$URL$path")
            else
              code=$(curl -s -o /dev/null -w '%{http_code}' "$URL$path")
            fi
            if [ "$code" = "$want" ]; then
              printf '  \033[32mok\033[0m   %-24s %-9s %s\n' "$path" "$mode" "$code"
            else
              printf '  \033[31mFAIL\033[0m %-24s %-9s %s (want %s)\n' "$path" "$mode" "$code" "$want"
              fail=1
            fi
          done
        }
        # A 500 in any row means a proto message could not be serialised in that format.
        probe /api/v1/health       200 200 200
        probe /api/v1/demo/ping    200 200 200
        probe /api/v1/demo/terms   200 200 200
        # Rejections must serialise too: ZenError is itself a proto message, so an auth
        # failure returning 500 instead of 401 is the same bug wearing a hat.
        probe /api/v1/demo/profile 401 401 401
        # The admin surface is JSON-only by design (bare array + Content-Range, ADR-005), so
        # protobuf is correctly Not Acceptable rather than an error.
        probe /api/v1/admin/users  401 401 406
        # Body-level: the default must be canonical proto3 JSON, not merely a 200.
        body=$(curl -s "$URL/api/v1/health")
        case "$body" in
          *'"status":"ok"'*) printf '  \033[32mok\033[0m   %-24s %-9s %s\n' /api/v1/health body "canonical proto3 JSON" ;;
          *) printf '  \033[31mFAIL\033[0m %-24s %-9s %s\n' /api/v1/health body "$body"; fail=1 ;;
        esac
        echo
        if [ "$fail" -eq 0 ]; then echo "Serves both transport modes."; else
          echo "NOT healthy. A 500 usually means a proto message is not registered for native reflection."
          exit 1
        fi

  deploy:cloudrun:
    desc: Build native, push to Artifact Registry, deploy to Cloud Run
    summary: |
      Cloud Run deploy. Notable choices:
        - No `firebase deploy`: jZen serves Cloud Run directly with no Firebase Hosting
          edge, which is what lets it use normal cookie names and proactive auth.
        - --max-instances=1, --min-instances=0: a deliberate cost floor. The native-image
          server handles the target load (~2K MAU) on a single instance at concurrency
          200, and min=0 means no warm instance to pay for (cold starts are accepted).
          Because there is at most one instance, in-process state (rate limiting, caches)
          is valid by construction. Raising max above 1 is the trigger to move such state
          to Postgres/Redis, not the other way around. See STANDARDS.md.
        - Scheduled work is triggered from OUTSIDE the container. min-instances=0 means
          there is no thread alive to run an in-process cron, so zen-jobs exposes
          POST /api/v1/jobs/trigger and one Cloud Scheduler entry calls it. One entry, one
          container start, N jobs: N entries would mean N cold starts.

      Requires: gcloud auth, GCP_PROJECT set, and everything under ONE-TIME SETUP below.
      Run it as `GCP_PROJECT=my-project task deploy:cloudrun` — this task never changes your
      global gcloud config, so it cannot leave your shell pointed somewhere unexpected.

      Deploy is deliberately manual and stays that way. Nothing triggers it but a person:
      CI runs the cheap gates, `task test:native` is the long local check before shipping,
      and this command is the act of shipping. Each application on jZen decides its own
      release process — ROADMAP's appendix leaves per-application pipelines to each app.

      ═══════════════════════════════════════════════════════════════════════════════════
      ONE-TIME SETUP — per environment, not per deploy. All of it is required; the deploy
      fails or the service 500s without it. Substitute PROJECT and REGION throughout.
      ═══════════════════════════════════════════════════════════════════════════════════

        0. Project, billing, APIs, registry. Cloud Run and Artifact Registry both refuse to
           enable without an open billing account attached.

             gcloud projects create PROJECT --name="..."
             gcloud billing projects link PROJECT --billing-account=BILLING_ACCOUNT_ID
             gcloud services enable run.googleapis.com artifactregistry.googleapis.com \
               secretmanager.googleapis.com cloudscheduler.googleapis.com --project=PROJECT
             gcloud artifacts repositories create jzen --repository-format=docker \
               --location=REGION --project=PROJECT
             gcloud auth configure-docker REGION-docker.pkg.dev

        1. The thirteen configuration secrets. `--set-secrets` below fails the deploy if any
           is absent, so create them all before the first run.

             mk() { printf '%s' "$2" | gcloud secrets create "$1" --data-file=- --project=PROJECT; }

             mk SUPABASE_URL      "https://<ref>.supabase.co"
             mk SUPABASE_KEY      "<publishable/anon key>"
             mk DB_URL            "jdbc:postgresql://<pooler-host>:5432/postgres"
             mk DB_USERNAME       "postgres.<ref>"
             mk DB_PASSWORD       "<database password>"
             mk SITE_URL          "https://<service-url>"
             mk AUTH_REDIRECT_URI "https://<service-url>/auth/callback"
             mk CORS_ORIGINS      "https://<service-url>"
             mk SMTP_HOST         "smtp-relay.brevo.com"
             mk SMTP_PORT         "587"
             mk SMTP_USERNAME     "<smtp login>"
             mk SMTP_PASSWORD     "<smtp api key>"
             mk SMTP_FROM         "noreply@<domain>"

           DB_URL must be the SESSION POOLER, not the direct connection and not the
           transaction pooler. Three constraints force this, and each fails differently:
             - the transaction pooler (:6543) has no advisory locks or prepared statements,
               so Flyway cannot take its migration lock and the app never finishes booting;
             - the direct host (db.<ref>.supabase.co) resolves to IPv6 only, while Cloud Run
               egress is IPv4 — the connection simply never establishes;
             - the pooler's username is `postgres.<ref>`, NOT the plain `postgres` the direct
               connection uses. Wrong form gives "tenant/user not found", which reads like a
               credential problem and is not one.

           SMTP may hold placeholders on a first deploy. EmailService.send() never throws by
           design (ADR-007), so unreachable mail degrades registration to a missing welcome
           email rather than a failure — real credentials can land later.

           SUPABASE_URL must be exact: mp.jwt.verify.issuer is derived as ${SUPABASE_URL}/auth/v1,
           and a mismatch fails JWT verification with no obvious clue.

        2. Let the runtime service account read those secrets. Without this the revision is
           created and then fails to start, because --set-secrets is resolved at boot.

             gcloud projects add-iam-policy-binding PROJECT --condition=None \
               --member="serviceAccount:PROJECT_NUMBER-compute@developer.gserviceaccount.com" \
               --role="roles/secretmanager.secretAccessor"

        3. Scheduled work. Jobs do not run until this exists, which means GDPR retention
           does not run either — the mechanism is proven (ADR-008) but nothing calls it.

        3a. Mint and store the trigger secret. The service is deployed
           allow-unauthenticated, so this header secret is what stands between the
           internet and the job that erases dormant personal data. The endpoint fails
           closed: with no secret configured it rejects every call.

             openssl rand -base64 32 | tr -d '\n' | \
               gcloud secrets create ZEN_JOBS_TRIGGER_TOKEN --data-file=- --project=PROJECT

        3b. Create the single scheduler entry. Hourly is ample: due-ness is computed from
           each job's own last_run_at, so the tick rate only bounds how soon a due job is
           noticed, never how often it runs.

             gcloud scheduler jobs create http zen-jobs-tick \
               --project=PROJECT --location=REGION \
               --schedule="0 * * * *" \
               --uri="https://SERVICE_URL/api/v1/jobs/trigger" \
               --http-method=POST \
               --headers="X-Zen-Job-Token=$(gcloud secrets versions access latest \
                 --secret=ZEN_JOBS_TRIGGER_TOKEN --project=PROJECT)"

           The flag is --headers on `create` and --update-headers on `update`; using the
           wrong one makes gcloud echo the token in its error message, which is how a
           secret ends up in a shell history or a terminal log. Reading it from Secret
           Manager inline, as above, keeps it off the command line either way.

        A missed tick is not a lost run: the next one sees a stale last_run_at and catches
        up. That is what makes GDPR retention a guarantee here rather than a hope.
    cmds:
      - task: build:server:native
      - |
        set -e
        IMAGE="{{.GCP_REGION}}-docker.pkg.dev/{{.GCP_PROJECT}}/{{.AR_REPO}}/{{.SERVICE_NAME}}:$(git rev-parse --short HEAD)"
        docker buildx build --platform linux/amd64 \
          -f {{.DEMO_SERVER_DIR}}/src/main/docker/Dockerfile.native-micro \
          -t "$IMAGE" {{.DEMO_SERVER_DIR}}
        docker push "$IMAGE"
        gcloud run deploy {{.SERVICE_NAME}} \
          --image="$IMAGE" \
          --project={{.GCP_PROJECT}} \
          --region={{.GCP_REGION}} \
          --memory=256Mi --cpu=1 \
          --min-instances=0 --max-instances=1 \
          --timeout=300s --port=8080 --concurrency=200 \
          --allow-unauthenticated \
          --set-secrets=SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_KEY=SUPABASE_KEY:latest,DB_URL=DB_URL:latest,DB_USERNAME=DB_USERNAME:latest,DB_PASSWORD=DB_PASSWORD:latest,CORS_ORIGINS=CORS_ORIGINS:latest,AUTH_REDIRECT_URI=AUTH_REDIRECT_URI:latest,SITE_URL=SITE_URL:latest,SMTP_HOST=SMTP_HOST:latest,SMTP_PORT=SMTP_PORT:latest,SMTP_USERNAME=SMTP_USERNAME:latest,SMTP_PASSWORD=SMTP_PASSWORD:latest,SMTP_FROM=SMTP_FROM:latest,ZEN_JOBS_TRIGGER_TOKEN=ZEN_JOBS_TRIGGER_TOKEN:latest

  # ---------------------------------------------------------------------------
  # Housekeeping
  # ---------------------------------------------------------------------------
  format:
    desc: Format all sources
    summary: |
      Formats the Dart workspace and both TypeScript surfaces. It propagates every exit
      code (STANDARDS "Orchestration"): the prettier calls previously ended in `|| true`,
      which hid the fact that prettier was never a declared dependency — the task reported
      success while formatting no TypeScript at all, for as long as it has existed.

      BOTH toolchains must be kept off the tracked generated files, for the same reason and
      by different means. `zen_demo_admin` carries a `.prettierignore` for
      `schema.generated.ts`; Dart has no such file and `dart format` ignores the
      `analyzer: exclude:` block (that governs analysis, not formatting), so the generated
      protobuf is excluded by the find below. Format either of them and the next
      regeneration re-emits the generator's own layout, so `sync:contracts` reports drift.

      Line width is declared per workspace in `analysis_options.yaml` (`formatter:
      page_width: 100`), not passed here, so an IDE format-on-save agrees with this task.
    cmds:
      - cd {{.CLIENT_DIR}} && {{.DART_FORMAT}}
      - cd {{.APPS_DIR}} && {{.DART_FORMAT}}
      - cd {{.ADMIN_DIR}} && pnpm exec prettier --write "src/**/*.{ts,tsx}"
      - cd {{.DEMO_ADMIN_DIR}} && pnpm exec prettier --write "src/**/*.{ts,tsx}"

  clean:
    desc: Remove all build output
    cmds:
      - cd {{.SERVER_DIR}} && ./mvnw -B -q clean
      - rm -rf {{.ADMIN_DIR}}/dist {{.ADMIN_DIR}}/node_modules/.vite
      - rm -rf {{.DEMO_ADMIN_DIR}}/dist {{.DEMO_ADMIN_DIR}}/node_modules/.vite
      - find . -name .dart_tool -type d -prune -exec rm -rf {} +

  verify:docs:
    desc: Fail if a README names a non-existent task, or a module LICENSE drifted from root
    silent: true
    summary: |
      The documentation drift gate (ROADMAP step 9, DECISIONS.md ADR-012). Prose has no
      compiler and no contract-sync, so two things a README carries can rot silently, and this
      task checks the two that are mechanically checkable:

        1. Every `task <name>` a README mentions must exist in `task --list`. This is what would
           have caught a README promising `task run:all` brings up more than it does. Only
           commands are checked - inline-code spans and code-fence command lines - so a bare
           `task` in prose or a flag like `task --list` is skipped.
        2. Every module LICENSE (the copies beside each pubspec/pom, git ls-files '*/LICENSE')
           must be byte-identical to the root LICENSE. A licence that differs from the one it
           claims to be is a legal defect, and sixteen copies of a 190-line file is a drift
           surface a diff closes for free.

      Unlike the step-8 standalone check (a terminal one-shot, reverted once its failure mode
      stopped occurring), README and LICENSE drift START the moment those files exist and keep
      recurring, so this ships as a standing gate. Wire it into CI beside sync:contracts.
    cmds:
      - |
        # No `pipefail`: the membership test below is `printf | grep -q`, and a matching grep
        # closes the pipe early, so pipefail would turn printf's harmless EPIPE into a failure.
        set -u
        if ! git rev-parse --git-dir >/dev/null 2>&1; then
          echo "Not a git repository, cannot verify docs."; exit 1
        fi

        # NO_COLOR plus an ANSI strip: `task --list` colorizes when it thinks it has a terminal,
        # and a colorized line does not match the parse below. Depending on TTY detection would
        # make this gate pass or fail by accident, so both defences are applied.
        valid=$(NO_COLOR=1 task --list 2>/dev/null \
          | sed -E 's/\x1b\[[0-9;]*m//g' \
          | sed -nE 's/^\* ([a-z0-9:_-]+):.*/\1/p' | sort -u)
        if [ -z "$valid" ]; then
          echo "Could not read the task list; refusing to pass vacuously."; exit 1
        fi
        fail=0

        # A literal backtick would be command substitution to the task interpreter, so the
        # inline-code delimiter is built with printf rather than written into the pattern.
        bt=$(printf '\140')

        echo "Checking task references in READMEs..."
        for md in $(git ls-files '*README.md'); do
          refs=$( { grep -oE "${bt}task +[a-z][a-z0-9:_ -]*${bt}" "$md" 2>/dev/null | tr -d "${bt}"
                    grep -oE '^ *task +[a-z][a-z0-9:_ -]*' "$md" 2>/dev/null
                  } | sed -E 's/^ *task +//' )
          for name in $refs; do
            case "$name" in -*) continue ;; esac
            if ! printf '%s\n' "$valid" | grep -qxF "$name"; then
              echo "  MISSING: '$md' references 'task $name', not in 'task --list'"
              fail=1
            fi
          done
        done
        [ "$fail" -eq 0 ] && echo "  All README task references resolve."

        echo "Checking LICENSE copies..."
        count=0
        for lic in $(git ls-files '*/LICENSE'); do
          if diff -q LICENSE "$lic" >/dev/null 2>&1; then
            count=$((count + 1))
          else
            echo "  DRIFTED: '$lic' differs from the root LICENSE"; fail=1
          fi
        done
        [ "$fail" -eq 0 ] && echo "  All $count module LICENSE copies are byte-identical to root."

        [ "$fail" -eq 0 ] && echo "Docs verified." || { echo "Docs verification FAILED."; exit 1; }
