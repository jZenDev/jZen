name: zen_demo_client
description: >-
  The jZen reference app: the runnable showcase of jZen driving the real Quarkus + Supabase
  backend, and the living end-to-end test stand (task test:e2e) wired into the CI release gate.
# Assembled from the jZen framework packages (Riverpod + zen_ui_identity + zen_ui_navigation
# + zen_transport) against the Quarkus server.
publish_to: "none"
# Lockstep with the product version (STANDARDS.md "Versioning").
version: 0.1.0

environment:
  sdk: ">=3.10.3 <4.0.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  # http is used only to type the shared session client that createSessionClient() returns.
  http: ^1.2.2
  zen_core:
    path: ../../../client/zen_core
  zen_identity:
    path: ../../../client/zen_identity
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  zen_transport:
    path: ../../../client/zen_transport
  zen_ui_identity:
    path: ../../../client/zen_ui_identity
  zen_ui_navigation:
    path: ../../../client/zen_ui_navigation

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # The pure-Dart end-to-end suite (integration_test/) runs on the VM via `dart test`, hitting
  # the live stack. It uses package:test (not flutter_test) so it stays headless - see test:e2e.
  test: ^1.25.0

# `generate: true` drives `flutter gen-l10n` from l10n.yaml. There are no l10n assets any
# more: the app's strings are compiled in (ADR-009), and the identity/navigation wording comes
# from those packages' own generated accessors rather than a merged bundle this app maintained.
flutter:
  uses-material-design: true
  generate: true
