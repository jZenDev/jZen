# Static OpenAPI base document.
#
# This is the resolution to TA-1 (BLUEPRINT.md): SmallRye cannot introspect a protobuf
# class into a clean schema, it emits 130+ builder-internal schemas, so model
# component schemas are supplied here instead, and SmallRye merges its annotation-scanned
# *paths* on top of this base.
#
# In the finished system this file is GENERATED from proto/zen/v1/*.proto by a
# protoc -> OpenAPI step in `task generate:api`, keeping proto the single source of truth.
# It is hand-authored for the walking skeleton to prove the merge works; the field names
# match proto3 canonical JSON (lowerCamelCase), which is what JsonFormat emits and what
# the Dart/TS generators consume.
openapi: 3.1.0
info:
  title: jZen API
  version: 0.1.0
components:
  schemas:
    HealthStatus:
      type: object
      description: Liveness/readiness payload returned by GET /api/v1/health.
      properties:
        status:
          type: string
          description: Overall status, e.g. "ok".
        service:
          type: string
          description: Logical service name.
        timestampMs:
          type: integer
          format: int64
          description: Server wall-clock time in ms since the Unix epoch.
    Identity:
      type: object
      description: >-
        The authenticated identity / session payload returned by the auth endpoints. An
        Identity with an empty id denotes "no session".
      properties:
        id:
          type: string
          description: Stable identity id (the Supabase auth.users id / JWT sub).
        lifecycleState:
          type: string
          description: One of "pending", "active", "revoked", "disabled".
        lifecycleReason:
          type: string
          description: Optional human-readable reason for the current lifecycle state.
        roles:
          type: array
          items:
            type: string
          description: Authority roles loaded from the users table (never from the JWT).
        capabilities:
          type: array
          items:
            type: string
          description: Fine-grained capabilities, if any.
        createdAtMs:
          type: integer
          format: int64
          description: Creation time in ms since the Unix epoch.
    LoginRequest:
      type: object
      description: Body for POST /api/v1/auth/login.
      properties:
        email:
          type: string
        password:
          type: string
    RegisterRequest:
      type: object
      description: Body for POST /api/v1/auth/register.
      properties:
        email:
          type: string
        password:
          type: string
    RestorePasswordRequest:
      type: object
      description: Body for POST /api/v1/auth/restore-password.
      properties:
        email:
          type: string
    Ping:
      type: object
      description: GET /api/v1/demo/ping response; message localized from Accept-Language.
      properties:
        message:
          type: string
          description: Localized "server is alive" message.
        timestampMs:
          type: integer
          format: int64
          description: Server wall-clock time in ms since the Unix epoch.
    Terms:
      type: object
      description: GET /api/v1/demo/terms response; localized Markdown terms content.
      properties:
        content:
          type: string
          description: Markdown document body for the requested locale.
        contentType:
          type: string
          description: MIME type of content; the demo serves "text/markdown".
    DemoProfile:
      type: object
      description: GET /api/v1/demo/profile response; the authenticated user's demo profile.
      properties:
        userId:
          type: string
          description: Stable user id (the Supabase auth.users id / JWT sub).
        displayName:
          type: string
          description: Display name for the profile view.
        email:
          type: string
          description: Account email.
        bio:
          type: string
          description: Optional free-text biography.
    AdminUser:
      type: object
      description: >-
        A users-table row projected for the admin panel (GET/PUT /api/v1/admin/users). The id is
        the react-admin record id. Field names are proto3 canonical JSON (lowerCamelCase).
      properties:
        id:
          type: string
          description: Stable user id (the Supabase auth.users id / JWT sub); the record id.
        email:
          type: string
          description: Account email.
        displayName:
          type: string
          description: Display name, if set.
        nickname:
          type: string
          description: Handle / nickname, if set.
        role:
          type: string
          description: Authority role; one of "user", "admin", "reviewer", "b2b_admin".
        language:
          type: string
          description: Preferred language code, e.g. "en".
        isPremium:
          type: boolean
          description: Whether the account is premium (payment).
        isPrivate:
          type: boolean
          description: Whether the profile is private.
        emailVerified:
          type: boolean
          description: Whether the account email is verified.
        createdAtMs:
          type: integer
          format: int64
          description: Account creation time in ms since the Unix epoch.
        lastLoginAtMs:
          type: integer
          format: int64
          description: Last login time in ms since the Unix epoch; 0 when never logged in.
    JobRun:
      type: object
      description: >-
        The outcome of one job executed during a tick of POST /api/v1/jobs/trigger. Field names
        are proto3 canonical JSON (lowerCamelCase).
      properties:
        jobId:
          type: string
          description: Stable job id; the zen_jobs primary key.
        status:
          type: string
          description: Terminal status of the run; "success" or "failure".
        startedAtMs:
          type: integer
          format: int64
          description: When the run started, in ms since the Unix epoch.
        durationMs:
          type: integer
          format: int64
          description: How long the run took, in milliseconds.
        error:
          type: string
          description: Failure detail; empty on success.
    JobTickResult:
      type: object
      description: >-
        POST /api/v1/jobs/trigger response; what was due at that moment and what happened to it.
      properties:
        startedAtMs:
          type: integer
          format: int64
          description: When the tick started, in ms since the Unix epoch.
        due:
          type: integer
          format: int32
          description: How many enabled, registered jobs were due.
        succeeded:
          type: integer
          format: int32
          description: How many due jobs completed without throwing.
        failed:
          type: integer
          format: int32
          description: How many due jobs threw.
        skippedOverlap:
          type: boolean
          description: True when a tick was already running and this one did nothing.
        runs:
          type: array
          description: One entry per job actually executed, in execution order.
          items:
            $ref: '#/components/schemas/JobRun'
    AdminUserList:
      type: array
      description: >-
        GET /api/v1/admin/users response; a page of AdminUser records as a bare JSON array. The
        total row count travels in the Content-Range header (the ra-data-simple-rest convention).
      items:
        $ref: '#/components/schemas/AdminUser'
