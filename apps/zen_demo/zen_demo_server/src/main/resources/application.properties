# jZen backend configuration.
#
# Derived from ../BugEater/bugeater-quarkus/src/main/resources/application.properties,
# with BugEater's domain config and its two Firebase-Hosting workarounds removed.
# Profiles use %dev/%test/%prod prefixes in a single file, matching the donor.

# ---------------------------------------------------------------------------
# Supabase
# ---------------------------------------------------------------------------
supabase.url=${SUPABASE_URL:http://127.0.0.1:54321}
supabase.key=${SUPABASE_KEY:}
supabase.default-role=${SUPABASE_DEFAULT_ROLE:authenticated}

site.url=${SITE_URL:http://localhost:8080}
auth.redirect-uri=${AUTH_REDIRECT_URI:http://localhost:8080/auth/callback}

# ---------------------------------------------------------------------------
# Datasource - local Supabase Postgres (supabase/config.toml, db port 54322)
# ---------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10
# URL/credentials are set only in %dev and %prod. %test deliberately leaves them unset
# so Quarkus Dev Services provisions a clean throwaway Postgres per run (Docker) --
# otherwise it would connect to whatever sits on the configured port, which on this
# machine is a leftover DB carrying BugEater's Flyway history.
%dev.quarkus.datasource.username=${DB_USERNAME:postgres}
%dev.quarkus.datasource.password=${DB_PASSWORD:postgres}
%dev.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://127.0.0.1:54322/postgres}
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}

# ---------------------------------------------------------------------------
# Flyway
# ---------------------------------------------------------------------------
# jZen starts from an empty schema, so unlike BugEater we do NOT set
# baseline-on-migrate / validate-on-migrate=false. Those exist there to tolerate a
# pre-existing hand-built schema; carrying them over would silently disable migration
# validation on a greenfield database.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# ---------------------------------------------------------------------------
# Supabase auth REST client - ports BugEater's timeouts (application.properties:49-62)
# ---------------------------------------------------------------------------
quarkus.rest-client.supabase-auth.url=${SUPABASE_URL:http://127.0.0.1:54321}/auth/v1
quarkus.rest-client.supabase-auth.connect-timeout=2000
quarkus.rest-client.supabase-auth.read-timeout=2000

# ---------------------------------------------------------------------------
# JWT - Supabase JWKS, ES256
# ---------------------------------------------------------------------------
mp.jwt.verify.publickey.location=${SUPABASE_JWKS_URL:${supabase.url}/auth/v1/.well-known/jwks.json}
mp.jwt.verify.issuer=${SUPABASE_URL:http://127.0.0.1:54321}/auth/v1
smallrye.jwt.verify.algorithm=ES256
smallrye.jwt.jwks.cache-time-to-live=10800
smallrye.jwt.jwks.refresh-interval=3600

# jZen serves Cloud Run directly with no Firebase Hosting in front, so, unlike
# BugEater, the access token lives in a normally-named cookie that SmallRye JWT can
# parse on its own. BugEater packs "access|refresh" into __session because Firebase
# Hosting strips every other cookie at the CDN edge (its ADR-034), which in turn forces
# quarkus.http.auth.proactive=false so that login/register are not 401'd before its
# SessionFilter can run (its application.properties:70-77). Both hacks are dropped here.
# mp.jwt.token.header=Cookie switches SmallRye JWT from the default Authorization header to the
# session cookie; mp.jwt.token.cookie then names it. Without the header line SmallRye keeps
# reading Authorization and never sees the cookie (so every cookie-authenticated request looks
# anonymous). Both are required together.
mp.jwt.token.header=Cookie
mp.jwt.token.cookie=zen_access_token
quarkus.http.auth.proactive=true

session.cookie.name=zen_access_token
session.cookie.refresh-name=zen_refresh_token
session.cookie.secure=${SESSION_COOKIE_SECURE:true}
%dev.session.cookie.secure=false
%test.session.cookie.secure=false

# ---------------------------------------------------------------------------
# Transport - dual-mode negotiation seam
# ---------------------------------------------------------------------------
# DartZen's negotiation header was X-DZ-Transport ("DZ" = DartZen); renamed here.
zen.transport.header=X-Zen-Transport
zen.transport.default-format=json

# ---------------------------------------------------------------------------
# OpenAPI - see BLUEPRINT.md TA-1 for the static-merge strategy
# ---------------------------------------------------------------------------
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.store-schema-directory=target/openapi
mp.openapi.extensions.smallrye.info.title=jZen API
mp.openapi.extensions.smallrye.info.version=0.1.0

# ---------------------------------------------------------------------------
# HTTP / CORS
# ---------------------------------------------------------------------------
quarkus.http.enable-compression=true
quarkus.http.limits.max-body-size=1M
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:8080,http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,X-Zen-Transport,X-Request-ID,X-CSRF-Token
# Content-Range/Accept-Ranges are exposed so a cross-origin react-admin panel can read the
# total row count from the list endpoints (the ra-data-simple-rest pagination convention).
quarkus.http.cors.exposed-headers=Location,Link,X-Zen-Transport,X-Request-ID,Content-Range,Accept-Ranges
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=3600

# ---------------------------------------------------------------------------
# Native image resources - the demo reads its localized terms Markdown from the
# classpath (DemoResource), so it must be embedded in the native binary. (The ping
# messages are a typed Qute @MessageBundle, handled by the Qute extension.)
# ---------------------------------------------------------------------------
quarkus.native.resources.includes=terms/*.md

# ---------------------------------------------------------------------------
# Mailer - stock quarkus-mailer SMTP. Brevo is just an SMTP host (SMTP_HOST=
# smtp-relay.brevo.com); nothing below is provider-specific.
# ---------------------------------------------------------------------------
quarkus.mailer.mock=true
# The sender is needed in every profile: the mock mailer still builds a real Mail, and
# EmailService would fail rendering-to-send with no From address.
quarkus.mailer.from=${SMTP_FROM:noreply@jzen.dev}
%prod.quarkus.mailer.mock=false
%prod.quarkus.mailer.host=${SMTP_HOST}
%prod.quarkus.mailer.port=${SMTP_PORT:587}
%prod.quarkus.mailer.username=${SMTP_USERNAME}
%prod.quarkus.mailer.password=${SMTP_PASSWORD}
%prod.quarkus.mailer.start-tls=REQUIRED

# ---------------------------------------------------------------------------
# Data retention (zen-identity UserRetentionJob, GDPR Art. 5(1)(e))
# ---------------------------------------------------------------------------
# There is no retention cron here any more (ROADMAP step 7a, DECISIONS ADR-008). The cycle is
# registered as a zen-jobs ZenJob by zen.demo.jobs.UserRetentionZenJob and runs when the job
# trigger below says it is due - which is what makes it fire in production, where an in-process
# @Scheduled provably could not. The retention windows keep the framework defaults (330/23/7 days).

# ---------------------------------------------------------------------------
# Jobs (zen-jobs) - guaranteed scheduled work
# ---------------------------------------------------------------------------
# The shared secret POST /api/v1/jobs/trigger requires. The framework declares no default at all,
# so an unconfigured deployment rejects every trigger rather than accepting every trigger.
#
# %dev and %test use a fixed local value: neither ever leaves this machine, and a literal here is
# what lets `task test:e2e` and a manual curl exercise the real credential path (the same reasoning
# as %dev.session.cookie.secure=false above). %prod takes it from Secret Manager - see the
# ZEN_JOBS_TRIGGER_TOKEN entry in Taskfile deploy:cloudrun - and fails closed if it is absent.
%dev.zen.jobs.trigger.token=dev-job-trigger-token
%test.zen.jobs.trigger.token=test-job-trigger-token
%prod.zen.jobs.trigger.token=${ZEN_JOBS_TRIGGER_TOKEN:}

# The in-process tick, for local development only. It calls exactly the same JobScheduler.tick()
# the external trigger calls, so dev and prod exercise one code path and differ only in who pulls
# the trigger. Every minute is frequent enough to watch a job fire while working on it; the jobs
# themselves are still only run when their own interval says they are due.
%dev.zen.jobs.tick.cron=0 * * * * ?
# %test leaves it at the framework default of off: no tick may fire behind a test's back, since
# the job suites drive JobScheduler.tick() directly and assert exactly what ran.
# %prod likewise stays off - under --min-instances=0 there is no thread alive to fire it, which is
# the entire reason zen-jobs exists (STANDARDS "Deployment model").

# ---------------------------------------------------------------------------
# %dev
# ---------------------------------------------------------------------------
%dev.quarkus.devservices.enabled=false
%dev.quarkus.log.console.json=false
%dev.quarkus.log.category."zen".level=DEBUG

# ---------------------------------------------------------------------------
# %test
# ---------------------------------------------------------------------------
%test.quarkus.devservices.enabled=true
%test.quarkus.log.console.json=false

# ---------------------------------------------------------------------------
# %prod - Cloud Run
# ---------------------------------------------------------------------------
%prod.quarkus.log.console.json=true
%prod.quarkus.http.proxy.proxy-address-forwarding=true
%prod.quarkus.http.proxy.allow-x-forwarded=true
%prod.quarkus.http.ssl-port=0
%prod.auth.redirect-uri=${AUTH_REDIRECT_URI}

# ---------------------------------------------------------------------------
# Native build
# ---------------------------------------------------------------------------
# BugEater additionally needs --initialize-at-run-time for flexmark's static Random
# (its application.properties:104-111). jZen has no flexmark dependency, markdown
# rendering was BugEater course-content machinery, so that flag is omitted.
quarkus.native.additional-build-args=
