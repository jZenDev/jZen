<!DOCTYPE html>
<!--
  English welcome message, rendered by zen-email's EmailService for a recipient whose
  users.language resolves to "en" (the fallback locale). Its Ukrainian counterpart is
  welcome_uk.html; the subject lives in MailMessages.welcomeSubject().

  Inline styles only, and no <style> block: Qute would read a CSS rule's braces as an
  expression. Available data: email, siteUrl.
-->
<html lang="en">
  <body style="margin: 0; padding: 24px; background: #f5f6f8; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #1c2024;">
    <div style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 32px;">
      <h1 style="margin: 0 0 16px; font-size: 22px;">Welcome to jZen</h1>
      <p style="margin: 0 0 16px; line-height: 1.6;">
        Your account <strong>{email}</strong> is ready. jZen speaks your language, both in the app
        and in messages like this one.
      </p>
      <p style="margin: 0 0 24px; line-height: 1.6;">
        Everything starts from the demo: sign in and take a look around.
      </p>
      <p style="margin: 0 0 24px;">
        <a href="{siteUrl}" style="display: inline-block; background: #1c2024; color: #ffffff; text-decoration: none; padding: 12px 20px; border-radius: 8px;">Open jZen</a>
      </p>
      <p style="margin: 0; font-size: 13px; color: #6b7280;">
        You are receiving this because an account was created with this address.
      </p>
    </div>
  </body>
</html>
