<!DOCTYPE html>
<!--
  Ukrainian welcome message, rendered by zen-email's EmailService for a recipient whose
  users.language resolves to "uk". English counterpart: welcome_en.html; the subject lives in
  MailMessagesUk.welcomeSubject().

  Inline styles only, and no <style> block: Qute would read a CSS rule's braces as an
  expression. Available data: email, siteUrl.
-->
<html lang="uk">
  <body style="margin: 0; padding: 24px; background: #f5f6f8; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #1c2024;">
    <div style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 32px;">
      <h1 style="margin: 0 0 16px; font-size: 22px;">Ласкаво просимо до jZen</h1>
      <p style="margin: 0 0 16px; line-height: 1.6;">
        Ваш обліковий запис <strong>{email}</strong> готовий. jZen спілкується вашою мовою - і в
        застосунку, і в таких листах.
      </p>
      <p style="margin: 0 0 24px; line-height: 1.6;">
        Почніть з демонстрації: увійдіть і роздивіться.
      </p>
      <p style="margin: 0 0 24px;">
        <a href="{siteUrl}" style="display: inline-block; background: #1c2024; color: #ffffff; text-decoration: none; padding: 12px 20px; border-radius: 8px;">Відкрити jZen</a>
      </p>
      <p style="margin: 0; font-size: 13px; color: #6b7280;">
        Ви отримали цей лист, бо з цією адресою було створено обліковий запис.
      </p>
    </div>
  </body>
</html>
