name: jzen_client
description: >-
  jZen client workspace: Dart/Flutter packages and the reference app.
# Lockstep with the product version (server pom 0.1.0-SNAPSHOT, admin 0.1.0). All
# packages/modules share one version, see docs/architecture/STANDARDS.md "Versioning".
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.10.3 <4.0.0"

# Pub workspace root for the client side. Packages live flat under client/ (e.g.
# client/zen_core), mirroring how the Java modules sit flat under server/. There is no
# packages/ or apps/ wrapper, a package is a package whether it is a library or the
# demo app, and a folder holding a single folder earns its keep only once it holds more.
#
# The workspace is the single source of truth for membership. Each member also declares
# `resolution: workspace`. The field must be a list (an empty scalar fails
# `dart analyze`), so it starts as [].
#
# client/ is client LIBRARIES only. Full application examples live under apps/ (their own pub
# workspace, apps/pubspec.yaml), depending on these libraries by relative path. A package's own
# example/ (a single-library demo) stays with its package, per the Dart convention.
#
# Client i18n is typed and generated per package by `flutter gen-l10n`, so a package that
# renders text owns its own .arb files rather than sharing a localization library
# (DECISIONS.md ADR-009).
workspace:
  - zen_core
  - zen_transport
  - zen_identity
  - zen_ui_navigation
  - zen_ui_navigation/example
  - zen_ui_identity
  - zen_ui_identity/example

dev_dependencies:
  flutter_lints: ^6.0.0
