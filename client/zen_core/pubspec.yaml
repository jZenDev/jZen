name: zen_core
description: >-
  Core layer for the jZen ecosystem: universal result types, value objects,
  logging, and shared contracts. Framework-free - depends only on `meta`.
# Lockstep with the product version - see docs/architecture/STANDARDS.md "Versioning".
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.10.3 <4.0.0"

resolution: workspace

# Ported from ../DartZen/packages/dartzen_core. Framework-free (no JAX-RS, no Panache, no
# Flutter). Dependencies are limited to small, standard, inspectable libraries, per the
# MANIFESTO's "no *custom* magic": a standard validation library beats a hand-rolled regex,
# the same reasoning that replaced the hand-written MessagePack codec with protobuf.
dependencies:
  # Standard email validation instead of a hand-maintained regex.
  email_validator: ^3.0.0
  meta: ^1.11.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
