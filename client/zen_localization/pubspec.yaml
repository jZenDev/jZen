name: zen_localization
description: Foundational localization package for the jZen ecosystem.
# Lockstep with the product version - see docs/architecture/STANDARDS.md "Versioning".
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.10.3 <4.0.0"

resolution: workspace

# Ported from ../DartZen/packages/dartzen_localization. TA-3 (docs/architecture/BLUEPRINT.md):
# `flutter` is a DEV-only dependency, not a runtime one, so Dart-only consumers do not drag
# in the Flutter SDK. The conditional import in zen_localization_loader.dart wires the
# Flutter loader (loader_flutter.dart, the only file importing package:flutter) in only when
# `dart.library.ui` is present.
dependencies:
  meta: ^1.11.0
  path: ^1.9.0
  zen_core:
    path: ../zen_core

dev_dependencies:
  flutter:
    sdk: flutter
  flutter_test:
    sdk: flutter
  lints: ^6.0.0
  test: ^1.25.0
