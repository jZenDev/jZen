name: zen_ui_identity
description: UI identity flows and components for jZen, respecting domain purity and Zen architecture.
# Lockstep with the product version - see docs/architecture/STANDARDS.md "Versioning".
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.10.3 <4.0.0"

resolution: workspace

# Ported from ../DartZen/packages/dartzen_ui_identity: provider-agnostic (zero Firebase
# references), so the Supabase re-point is pure wiring in the consuming app - override
# identityRepositoryProvider with a SupabaseIdentityRepository (see example/). The donor's
# runtime string-key localization was replaced by typed, generated `flutter gen-l10n`
# accessors (ROADMAP step 7b, DECISIONS.md ADR-009).
dependencies:
  zen_core:
    path: ../zen_core
  zen_identity:
    path: ../zen_identity
  zen_ui_navigation:
    path: ../zen_ui_navigation
  flutter:
    sdk: flutter
  # Both are imported by the generated IdentityLocalizations. intl is pinned to the version
  # flutter_localizations itself pins, so an app composing several localized jZen packages
  # resolves one intl.
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^3.0.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

topics:
  - identity
  - ui
  - flutter
  - zen

# `generate: true` drives `flutter gen-l10n` from l10n.yaml. The per-locale JSON asset is
# gone: generated strings are Dart code, not a runtime asset load (ADR-009, TA-7).
flutter:
  generate: true
