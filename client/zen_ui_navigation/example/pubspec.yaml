name: zen_ui_navigation_example
description: "Example of using zen_ui_navigation"
publish_to: 'none'

version: 0.1.0

environment:
  sdk: '>=3.10.3 <4.0.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  # Navigation package from workspace
  zen_ui_navigation:
    path: ../

  zen_core:
    path: ../../zen_core

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  flutter_riverpod: ^3.0.3   # State management
  cupertino_icons: ^1.0.8 # Icons

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# `generate: true` drives `flutter gen-l10n` from l10n.yaml. The l10n JSON assets are gone:
# generated strings are Dart code, not a runtime asset load (ADR-009, reinforcing TA-7).
flutter:
  uses-material-design: true
  generate: true
