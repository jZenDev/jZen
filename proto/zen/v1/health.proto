syntax = "proto3";

package zen.v1;

// Canonical model. This file is the single source of truth for the HealthStatus shape;
// the Java DTO, the Dart message, the OpenAPI schema, and the admin TypeScript type are
// all generated from it. Never hand-edit the generated output - edit this and run
// `task sync:contracts`.

option java_package = "zen.proto.v1";
option java_multiple_files = true;
option java_outer_classname = "HealthProto";

// Liveness/readiness payload returned by GET /api/v1/health.
message HealthStatus {
  // Overall status, e.g. "ok".
  string status = 1;
  // Logical service name.
  string service = 2;
  // Server wall-clock time in milliseconds since the Unix epoch.
  int64 timestamp_ms = 3;
}
