# Static OpenAPI base document.
#
# This is the resolution to TA-1 (BLUEPRINT.md): SmallRye cannot introspect a protobuf
# class into a clean schema, it emits 130+ builder-internal schemas, so model
# component schemas are supplied here instead, and SmallRye merges its annotation-scanned
# *paths* on top of this base.
#
# In the finished system this file is GENERATED from proto/zen/v1/*.proto by a
# protoc -> OpenAPI step in `task generate:api`, keeping proto the single source of truth.
# It is hand-authored for the walking skeleton to prove the merge works; the field names
# match proto3 canonical JSON (lowerCamelCase), which is what JsonFormat emits and what
# the Dart/TS generators consume.
openapi: 3.1.0
info:
  title: jZen API
  version: 0.1.0
components:
  schemas:
    HealthStatus:
      type: object
      description: Liveness/readiness payload returned by GET /api/v1/health.
      properties:
        status:
          type: string
          description: Overall status, e.g. "ok".
        service:
          type: string
          description: Logical service name.
        timestampMs:
          type: integer
          format: int64
          description: Server wall-clock time in ms since the Unix epoch.
