# Framework defaults for zen-identity. Shipped inside the jar at the standard MicroProfile
# config ordinal (100), so an application's own application.properties (ordinal 250) overrides
# any of these without having to redeclare the rest.

# Data retention (UserRetentionJob / UserRetentionService, GDPR Art. 5(1)(e)).
#
# OFF by default: a framework must never start warning users and anonymising accounts merely
# because an app depends on zen-identity. An app opts in by setting a cron expression, e.g.
# zen.identity.retention.cron=0 0 3 * * ?
zen.identity.retention.cron=off

# Dormancy before the first warning. The donor used 330 days; the two offsets below then give
# the user 30 more days, which is what its warning wording promised.
zen.identity.retention.warning-days=330
# Grace between the first and the final warning.
zen.identity.retention.final-warning-offset-days=23
# Grace between the final warning and anonymisation.
zen.identity.retention.anonymise-offset-days=7
