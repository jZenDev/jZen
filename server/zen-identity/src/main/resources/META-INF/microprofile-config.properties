# Framework defaults for zen-identity. Shipped inside the jar at the standard MicroProfile
# config ordinal (100), so an application's own application.properties (ordinal 250) overrides
# any of these without having to redeclare the rest.

# Data retention (UserRetentionJob / UserRetentionService, GDPR Art. 5(1)(e)).
#
# There is no cron property here any more (ROADMAP step 7a, DECISIONS ADR-008). An in-process
# @Scheduled cannot fire under Cloud Run's --min-instances=0, so retention is no longer scheduled
# from inside this library at all: UserRetentionJob.runCycle() is a plain callable, and an
# application opts in by registering it as a zen-jobs ZenJob. Opting in is still explicit - a
# framework must never start warning users and anonymising accounts merely because an app depends
# on zen-identity - it just happens at the registration, not at a cron expression.

# Dormancy before the first warning. The two offsets below then give the user 30 further days,
# which is what the warning wording promises - the countdown quoted in a message is derived from
# these values, so wording and schedule cannot drift apart.
zen.identity.retention.warning-days=330
# Grace between the first and the final warning.
zen.identity.retention.final-warning-offset-days=23
# Grace between the final warning and anonymisation.
zen.identity.retention.anonymise-offset-days=7
