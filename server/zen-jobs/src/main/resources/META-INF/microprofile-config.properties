# Framework defaults for zen-jobs. Shipped inside the jar at the standard MicroProfile config
# ordinal (100), so an application's own application.properties (ordinal 250) overrides any of
# these without having to redeclare the rest.

# The in-process tick, for local development only. OFF by default: a framework must never start
# running an application's jobs merely because it depends on zen-jobs, and under Cloud Run's
# --min-instances=0 an in-process cron cannot fire reliably anyway (STANDARDS "Deployment model").
# An app turns it on in %dev, e.g. zen.jobs.tick.cron=0 * * * * ?
zen.jobs.tick.cron=off

# zen.jobs.trigger.token is deliberately NOT declared here.
#
# It is the shared secret POST /api/v1/jobs/trigger requires, and its absence is what makes the
# endpoint fail closed: with no secret configured, JobTriggerAuthenticator rejects every call and
# says so in the log. Shipping a default - even an empty one - would risk a deployment that
# accepts a trigger it should not, on an endpoint whose first job erases personal data.
# Applications set it from a secret store; see Taskfile deploy:cloudrun.
