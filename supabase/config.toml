# jZen local Supabase stack.
#
# The ports here match the JDBC default in the app server's application.properties
# (jdbc:postgresql://127.0.0.1:54322/postgres), so the local stack works with no overrides.
#
# There is no seed data and no supabase/migrations/: Flyway is jZen's single migration
# authority (STANDARDS "Database migrations").
#
# Full reference: https://supabase.com/docs/guides/local-development/cli/config
project_id = "jzen"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
# Must match the remote database's major version.
major_version = 17

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

# Catches outbound mail locally so the quarkus-mailer path is exercisable without an
# SMTP account. In %dev the app also sets quarkus.mailer.mock=true; flip that to false
# to route dev mail here instead.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:8080"
additional_redirect_urls = ["http://localhost:8080/auth/callback", "http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[analytics]
enabled = false
